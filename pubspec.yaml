name: codesprout
description: "codesprout learning app"
publish_to: 'none' # Prevent accidental publishing

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  supabase_flutter: ^2.0.0
  provider: ^6.1.0
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^9.0.0
  http: ^1.2.0
  intl: ^0.19.0
  uuid: ^4.0.1

  # File & storage
  file_picker: ^10.3.7
  path_provider: ^2.1.2
  open_filex: ^4.7.0
  mime: ^2.0.0
  image_picker: ^1.0.4

  # PDF & docs
  pdfx: ^2.1.0

  # UI & visuals
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
